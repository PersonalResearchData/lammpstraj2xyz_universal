<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAMMPS .trj to .xyz コンバーター</title>
    <!-- Tailwind CSSの読み込み -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 外部CSSファイルの読み込み -->
    <link rel="stylesheet" href="style.css">
    <!-- Google Fontsの読み込み -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body class="bg-gray-100 text-gray-800 flex items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-2xl bg-white rounded-xl shadow-lg p-8">
        <header class="text-center mb-8">
            <h1 class="text-3xl font-bold text-gray-900">LAMMPS .trj to .xyz コンバーター</h1>
            <p class="text-gray-600 mt-2">ブラウザ上でトラジェクトリファイルを分割し、各タイムステップを.xyzファイルとしてダウンロードします。</p>
        </header>

        <main>
            <div class="mb-6">
                <label for="trjFileInput" class="block w-full cursor-pointer bg-blue-500 hover:bg-blue-600 text-white font-bold py-3 px-4 rounded-lg text-center transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 inline-block mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" />
                    </svg>
                    .trjファイルを選択
                </label>
                <input type="file" id="trjFileInput" class="hidden">
                <p id="fileName" class="text-center text-sm text-gray-500 mt-2"></p>
            </div>

            <div id="status" class="text-center my-4"></div>
            
            <div id="results" class="space-y-3">
                <!-- ダウンロードリンクはここに動的に生成されます -->
            </div>
        </main>
    </div>

    <!-- 外部JavaScriptファイルの読み込み -->
    <script src="script.js"></script>
</body>
</html>
